<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>FuelFlow Tracker</title>
  <link rel="icon" type="image/png" href="https://i.ibb.co.com/KxSxp4VV/ya-allah.png">
  <style>
    body, html { margin: 0; padding: 0; height: 100%; width: 100%; overflow: hidden; background-color: #0a0b0e; }
    iframe { position: absolute; top: 0; left: 0; width: 100%; height: 100%; border: none; }
  </style>
</head>
<body>

  <iframe id="appFrame" allow="camera; microphone; geolocation" title="FuelFlow System"></iframe>

  <script>
    // 1. Ambil status login dari Vercel
    const urlParams = window.location.search;
    
    // 2. Link ASLI Google Apps Script kamu
    const scriptUrl = "https://script.google.com/macros/s/AKfycbyzoAwH4IgzUyjZHbk87p0MyBhAGrYPdiP96A-EfHgIRIx3ry1kldrodxgmHoxrrLcA/exec";
    
    // 3. Masukkan link + status login ke dalam Iframe
    document.getElementById("appFrame").src = scriptUrl + urlParams;
  </script>

</body>
</html>
