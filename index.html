<!DOCTYPE html>
<html>
<head>
  <title>FuelFlow Tracker</title>
  <style>
    body, html { margin: 0; padding: 0; height: 100%; width: 100%; overflow: hidden; background: #0a0b0e; }
    
    /* Bungkus Iframe agar bisa dipotong */
    .wrapper {
      position: absolute;
      top: -60px; /* Tarik ke atas untuk sembunyikan banner atas */
      left: 0;
      width: 100%;
      height: calc(100% + 45px); /* Tambah tinggi biar nggak kepotong di bawah */
    }
    
    iframe { width: 100%; height: 100%; border: none; }
  </style>
</head>
<body>
  <div class="wrapper">
    <iframe src="https://script.google.com/macros/s/AKfycbw5Fe7Bq8MD8yy-gitzTvOn_xJDUTdbhJ88ad6XMBLCldsEb21V9jH6ZROzr4MwtsmJ/exec"></iframe>
  </div>
</body>
</html>
